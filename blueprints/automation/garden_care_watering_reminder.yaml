blueprint:
  name: Garden Care - Watering Reminder
  description: Send a notification when plants need watering
  domain: automation
  input:
    notification_time:
      name: Notification Time
      description: When should the notification be sent?
      default: "07:00:00"
      selector:
        time:
    notification_action:
      name: Notification Action
      description: Which notification action to use?
      default: notify.notify
      selector:
        text:
    notification_title:
      name: Notification Title
      description: Title of the notification
      default: "🌱 Garden Care: Watering"
      selector:
        text:

triggers:
  - trigger: time
    at: !input notification_time

conditions:
  - condition: numeric_state
    entity_id: sensor.plants_to_water
    above: 0

actions:
  - action: !input notification_action
    data:
      title: !input notification_title
      message: >
        {{ state_attr('sensor.plants_to_water', 'plants') | length }} plant(s) need watering:
        {{ state_attr('sensor.plants_to_water', 'plants') | join(', ') }}
      data:
        priority: high
        tag: watering

mode: single

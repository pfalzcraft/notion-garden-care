blueprint:
  name: Garden Care - Fertilizing Reminder
  description: Send a notification when plants need fertilizing
  domain: automation
  input:
    notification_time:
      name: Notification Time
      description: When should the notification be sent?
      default: "08:00:00"
      selector:
        time:
    notification_service:
      name: Notification Service
      description: Which notification service to use?
      default: notify.notify
      selector:
        text:
    notification_title:
      name: Notification Title
      description: Title of the notification
      default: "🌿 Garden Care: Fertilizing"
      selector:
        text:

trigger:
  - platform: time
    at: !input notification_time

condition:
  - condition: numeric_state
    entity_id: sensor.plants_to_fertilize
    above: 0

action:
  - service: !input notification_service
    data:
      title: !input notification_title
      message: >
        {{ state_attr('sensor.plants_to_fertilize', 'plants') | length }} plant(s) need fertilizing:
        {{ state_attr('sensor.plants_to_fertilize', 'plants') | join(', ') }}
      data:
        priority: normal
        tag: fertilizing

mode: single

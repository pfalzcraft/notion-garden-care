# Services for Notion Garden Care integration

mark_as_watered:
  name: Mark Plant as Watered
  description: Updates the "Last Watered" date in Notion for a plant
  fields:
    page_id:
      name: Page ID
      description: The Notion page ID of the plant (optional if plant_name is provided)
      example: "1234567890abcdef"
      selector:
        text:
    plant_name:
      name: Plant Name
      description: The name of the plant (optional if page_id is provided)
      example: "Tomatoes"
      selector:
        text:
    date:
      name: Date
      description: The date to set (optional, defaults to today). Format YYYY-MM-DD
      example: "2026-01-25"
      selector:
        date:


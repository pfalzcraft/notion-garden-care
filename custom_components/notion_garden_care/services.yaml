update_plant_property:
  name: Update Plant Property
  description: Updates any property in Notion for a plant. Supports text, number, checkbox, date, and multi-select values.
  fields:
    entity_id:
      name: Plant
      description: Select the plant sensor
      selector:
        entity:
          integration: notion_garden_care
          domain: sensor
    page_id:
      name: Page ID
      description: The Notion page ID (alternative to selecting entity)
      example: "1234567890abcdef"
      selector:
        text:
    plant_name:
      name: Plant Name
      description: The name of the plant (alternative to selecting entity)
      example: "Tomatoes"
      selector:
        text:
    property_name:
      name: Property Name
      description: Select the Notion property to update
      required: true
      selector:
        select:
          options:
            # ── Basic Info ──
            - "Type"
            - "Location"
            - "Active"
            - "Lifecycle"
            # ── Plant Characteristics ──
            - "Height"
            - "Growth per Year"
            - "Hardiness Zone"
            # ── Environment ──
            - "Sun Exposure"
            - "Soil Type"
            - "Soil pH"
            # ── Watering ──
            - "Water Interval (days)"
            - "Last Watered"
            - "Water Amount"
            # ── Fertilizing ──
            - "Fertilize Interval (days)"
            - "Last Fertilized"
            - "Fertilizer Type"
            # ── Pruning ──
            - "Prune Months"
            - "Last Pruned"
            - "Prune Instructions"
            # ── Harvest ──
            - "Harvest Months"
            - "Last Harvested"
            - "Harvest Notes"
            # ── Lawn Care ──
            - "Aeration Interval (days)"
            - "Last Aeration"
            - "Sanding Interval (days)"
            - "Last Sanded"
            # ── Companions & Safety ──
            - "Companion Plants"
            - "Bad Companions"
            - "Bee Friendly"
            - "Toxicity"
            - "Winterize"
            # ── Notes ──
            - "Care Instructions"
            - "Special Notes"
            - "Notes"
    property_value:
      name: Property Value
      description: "The value to set. Type is auto-detected: number for integers/floats, true/false for checkbox, YYYY-MM-DD for dates, list for multi-select, otherwise text"
      example: "7"
      required: true
      selector:
        text:

refresh_database:
  name: Refresh Database
  description: Manually refresh the Notion Garden Care database data

add_plant:
  name: Add Plant (AI)
  description: Add a new plant using AI to automatically fill in care information. Requires a conversation agent to be configured in the integration options.
  fields:
    plant_name:
      name: Plant Name
      description: The name of the plant to add (e.g., "Lavender", "Strawberry", "Mint")
      example: "Lavender"
      required: true
      selector:
        text:

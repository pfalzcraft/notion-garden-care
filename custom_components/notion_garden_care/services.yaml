# Services for Notion Garden Care integration

mark_as_watered:
  name: Mark Plant as Watered
  description: Updates the "Last Watered" date in Notion for a plant
  fields:
    entity_id:
      name: Plant
      description: Select the plant sensor
      selector:
        entity:
          integration: notion_garden_care
          domain: sensor
    page_id:
      name: Page ID
      description: The Notion page ID (alternative to selecting entity)
      example: "1234567890abcdef"
      selector:
        text:
    plant_name:
      name: Plant Name
      description: The name of the plant (alternative to selecting entity)
      example: "Tomatoes"
      selector:
        text:
    date:
      name: Date
      description: Date to set (defaults to today if not specified)
      selector:
        date:


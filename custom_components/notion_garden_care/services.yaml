update_plant_property:
  name: Update Plant Property
  description: Updates any property in Notion for a plant. Supports text, number, checkbox, date, and multi-select values.
  fields:
    page_id:
      name: Page ID
      description: The Notion page ID of the plant (optional if plant_name is provided)
      example: "1234567890abcdef"
      selector:
        text:
    plant_name:
      name: Plant Name
      description: The name of the plant (optional if page_id is provided)
      example: "Tomatoes"
      selector:
        text:
    property_name:
      name: Property Name
      description: The exact name of the Notion property to update
      example: "Water Interval (days)"
      required: true
      selector:
        text:
    property_value:
      name: Property Value
      description: "The value to set. Type is auto-detected: number for integers/floats, true/false for checkbox, YYYY-MM-DD for dates, list for multi-select, otherwise text"
      example: "7"
      required: true
      selector:
        text:

refresh_database:
  name: Refresh Database
  description: Manually refresh the Notion Garden Care database data
